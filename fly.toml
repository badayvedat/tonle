app = "your-tonle-app"
primary_region = "iad"

[env]
  TONLE_PORT = "8080"
  TONLE_REQUIRE_AUTH = "true"
  TONLE_MAX_REQUEST_BYTES = "1048576"
  TONLE_MAX_EVENT_BYTES = "65536"
  STREAM_TTL = "600"
  STREAM_MAXLEN = "10000"
  TONLE_SSE_POLL_INTERVAL = "5"
  TONLE_MAX_ACTIVE_SSE_CONNECTIONS = "1000"
  TONLE_MAX_ACTIVE_SSE_CONNECTIONS_PER_STREAM = "100"
  TONLE_MAX_ACTIVE_POLLS = "1000"
  TONLE_MAX_ACTIVE_POLLS_PER_STREAM = "100"
  TONLE_RATE_LIMIT_WINDOW_SECONDS = "60"
  TONLE_RATE_LIMIT_REQUESTS_PER_WINDOW = "600"
  TONLE_RATE_LIMIT_WRITES_PER_WINDOW = "300"
  TONLE_RATE_LIMIT_AUTH_FAILURES_PER_WINDOW = "60"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/readyz"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
